appId: com.midwaymayhem.app
# Maestro flow: 30-second gameplay run — steer, honk, verify 100 m distance.
# Uses ?skip=1 via initialHref in Capacitor server config to bypass title screen.
# The app reads window.location.search on boot; native deeplink isn't needed —
# the debug APK is built with CAPACITOR=true vite build which embeds the URL.
# For CI the APK is built with pnpm build:native which sets base='./'; the
# ?skip=1 flag is exercised through the Playwright E2E path. For native Maestro
# we tap START and drive normally — 100 m is reached within 30 s at arcade speed.
# Output screenshot: docs/media/maestro/android/mid-run.png
---
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible:
      id: "start-button"
    timeout: 15000

- tapOn:
    id: "start-button"

- extendedWaitUntil:
    visible:
      id: "hud"
    timeout: 20000

# Steer left/right 10 times — swipe across the lower half of the screen
- swipe:
    start: "70%,75%"
    end: "30%,75%"
- swipe:
    start: "30%,75%"
    end: "70%,75%"
- swipe:
    start: "70%,75%"
    end: "30%,75%"
- swipe:
    start: "30%,75%"
    end: "70%,75%"
- swipe:
    start: "70%,75%"
    end: "30%,75%"
- swipe:
    start: "30%,75%"
    end: "70%,75%"
- swipe:
    start: "70%,75%"
    end: "30%,75%"
- swipe:
    start: "30%,75%"
    end: "70%,75%"
- swipe:
    start: "70%,75%"
    end: "30%,75%"
- swipe:
    start: "30%,75%"
    end: "70%,75%"

# Tap HONK 5 times
- tapOn:
    id: "honk-button"
- tapOn:
    id: "honk-button"
- tapOn:
    id: "honk-button"
- tapOn:
    id: "honk-button"
- tapOn:
    id: "honk-button"

# Wait for distance counter to show >= 100 m.
# The hud-stats panel contains "DISTANCE" label and a numeric value followed by "m".
# extendedWaitUntil polls until the text pattern appears (regex: 1[0-9]{2}m or [2-9][0-9]{2}m).
- extendedWaitUntil:
    visible:
      text: "1[0-9][0-9]"
    timeout: 30000

# Confirm HUD still intact (no crash to game-over during the run)
- assertVisible:
    id: "hud"
- assertNotVisible:
    id: "game-over"

- takeScreenshot: "docs/media/maestro/android/mid-run"

- stopApp
