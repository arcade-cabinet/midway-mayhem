appId: com.midwaymayhem.app
---
# Launch with ?autoplay=1 in the URL via the Capacitor webview start URL.
# Capacitor loads public/index.html from the bundle; we inject autoplay by
# tapping the NEW RUN button if the title screen shows, otherwise just let
# the governor drive (if wired via a deep link, switch to 'openLink').
- launchApp:
    clearState: true
- waitForAnimationToEnd
- takeScreenshot: docs/media/android-gameplay-00-title
- tapOn:
    text: "NEW RUN"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "▶ PLAY"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: docs/media/android-gameplay-01-started
- extendedWaitUntil:
    # Let the governor drive for 10 real seconds capturing frames.
    timeout: 10000
    visible:
      text: "."
- takeScreenshot: docs/media/android-gameplay-02-mid
- extendedWaitUntil:
    timeout: 10000
    visible:
      text: "."
- takeScreenshot: docs/media/android-gameplay-03-late
- extendedWaitUntil:
    timeout: 10000
    visible:
      text: "."
- takeScreenshot: docs/media/android-gameplay-04-final
