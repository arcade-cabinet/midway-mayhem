appId: com.midwaymayhem.app
tags: [gameplay]
---
# 30-second autoplay run with screenshot every ~5s. Proves the car
# actually drives on Android emulator, score increments, cockpit stays
# rendered, no crashes.
- launchApp:
    clearState: true
    arguments:
      path: "?autoplay=1&governor=1&phrase=neon-polkadot-jalopy"
- waitForAnimationToEnd
- takeScreenshot: docs/media/maestro/android-gameplay-00-start
- extendedWaitUntil:
    timeout: 5000
    visible:
      text: "0"
- takeScreenshot: docs/media/maestro/android-gameplay-01-t5s
- extendedWaitUntil:
    timeout: 5000
    visible:
      text: "0"
- takeScreenshot: docs/media/maestro/android-gameplay-02-t10s
- extendedWaitUntil:
    timeout: 5000
    visible:
      text: "0"
- takeScreenshot: docs/media/maestro/android-gameplay-03-t15s
- extendedWaitUntil:
    timeout: 5000
    visible:
      text: "0"
- takeScreenshot: docs/media/maestro/android-gameplay-04-t20s
- extendedWaitUntil:
    timeout: 5000
    visible:
      text: "0"
- takeScreenshot: docs/media/maestro/android-gameplay-05-t25s
- extendedWaitUntil:
    timeout: 5000
    visible:
      text: "0"
- takeScreenshot: docs/media/maestro/android-gameplay-06-t30s
# App should still be running — if the governor crashed, assertion below
# fires on screen text.
- assertVisible:
    text: "0"
