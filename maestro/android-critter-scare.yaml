appId: com.midwaymayhem.app
# Maestro flow: critter scare — honk near a critter obstacle, verify crowd score rises.
# Crowd score is displayed in hud-crowd panel. We capture the initial crowd value,
# drive for a while so critters spawn, honk repeatedly, then assert the crowd panel
# shows a higher value. Maestro does not parse numeric text deltas natively, so we
# assert that the crowd panel is visible before and after honking, and capture a
# screenshot for manual QA review. For automated delta assertion the CI job compares
# screenshots via image diff (see scripts/native-smoke-android.sh).
# Output screenshot: docs/media/maestro/android/critter-fleeing.png
---
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible:
      id: "start-button"
    timeout: 15000

- tapOn:
    id: "start-button"

- extendedWaitUntil:
    visible:
      id: "hud"
    timeout: 20000

# Record baseline — crowd panel must be visible
- assertVisible:
    id: "hud-crowd"

# Drive 15 s to reach critter-spawn zone (BarkerCrowd spawns within first 200 m)
- swipe:
    start: "50%,75%"
    end: "50%,25%"
    duration: 300
- swipe:
    start: "50%,75%"
    end: "50%,25%"
    duration: 300
- swipe:
    start: "50%,75%"
    end: "50%,25%"
    duration: 300

# Honk repeatedly near critters to scare them and raise crowd reaction
- tapOn:
    id: "honk-button"
- tapOn:
    id: "honk-button"
- tapOn:
    id: "honk-button"
- tapOn:
    id: "honk-button"
- tapOn:
    id: "honk-button"
- tapOn:
    id: "honk-button"
- tapOn:
    id: "honk-button"
- tapOn:
    id: "honk-button"

# Allow 3 s for crowd reaction to tick up
- waitForAnimationToEnd:
    timeout: 3000

# Crowd panel must still be visible and non-zero
# (Maestro asserts presence; numeric delta verified via screenshot diff in CI)
- assertVisible:
    id: "hud-crowd"

- takeScreenshot: "docs/media/maestro/android/critter-fleeing"

- stopApp
