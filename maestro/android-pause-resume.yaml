appId: com.midwaymayhem.app
# Maestro flow: pause and resume.
# NOTE: As of the current HUD implementation (src/hud/HUD.tsx) there is no
# dedicated pause button or pause-overlay testId in the component tree.
# The gameState.paused field exists (src/game/gameState.ts) but the HUD does not
# yet expose a tap target. This flow is intentionally minimal: it verifies that
# the app can be backgrounded and foregrounded via the OS back-stack without
# crashing, and that the HUD is still intact after resume.
# When a pause button is added (testId "pause-button") replace the OS-background
# section below with tapOn + assertVisible "pause-overlay".
---
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible:
      id: "start-button"
    timeout: 15000

- tapOn:
    id: "start-button"

- extendedWaitUntil:
    visible:
      id: "hud"
    timeout: 20000

# No pause button in current HUD — background the app via the home key, then
# bring it back. The App lifecycle plugin fires background/foreground events
# which gameState.pause()/resume() hook into.
- pressKey: Home
- waitForAnimationToEnd:
    timeout: 1500

# Re-open the app
- launchApp:
    clearState: false

# HUD must be visible after resume (run continues from where it left off)
- extendedWaitUntil:
    visible:
      id: "hud"
    timeout: 10000

- assertVisible:
    id: "hud-hype"

- stopApp
