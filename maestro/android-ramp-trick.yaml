appId: com.midwaymayhem.app
---
- launchApp:
    clearState: true
- tapOn:
    id: "start-button"
- tapOn:
    id: "new-run-play"
- waitForAnimationToEnd
# Trick trigger — swipe up on the right half of the screen
- swipe:
    start: "75%,80%"
    end: "75%,40%"
- takeScreenshot: docs/media/android-ramp-trick-after
