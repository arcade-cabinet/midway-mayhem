appId: com.midwaymayhem.app
# Maestro flow: iOS pause/resume via app backgrounding.
# NOTE: No dedicated pause button in current HUD. See android-pause-resume.yaml
# for the same caveat. On iOS we use the home key (Command+Shift+H in simulator)
# to background; Maestro maps pressKey: Home to the simulator home gesture.
# When a pause-button testId lands, replace with tapOn + assertVisible "pause-overlay".
---
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible:
      id: "start-button"
    timeout: 20000

- tapOn:
    id: "start-button"

- extendedWaitUntil:
    visible:
      id: "hud"
    timeout: 25000

# Background via home button
- pressKey: Home
- waitForAnimationToEnd:
    timeout: 1500

# Re-launch (foreground) from recents
- launchApp:
    clearState: false

- extendedWaitUntil:
    visible:
      id: "hud"
    timeout: 12000

- assertVisible:
    id: "hud-hype"

- stopApp
