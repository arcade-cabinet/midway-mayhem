appId: com.midwaymayhem.app
tags: [gameplay]
---
# Start a run and wait for GAME OVER (natural end of track or damage).
# Capacitor WebView doesn't accept external openLink; we drive through
# the title UI instead.
- launchApp:
    clearState: true
- waitForAnimationToEnd
- tapOn:
    text: "NEW RUN"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "▶ PLAY"
    optional: true
- waitForAnimationToEnd
- extendedWaitUntil:
    timeout: 90000
    visible:
      text: "RUN IT BACK"
- takeScreenshot: docs/media/maestro/android-game-over
