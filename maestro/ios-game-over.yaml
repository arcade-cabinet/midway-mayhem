appId: com.midwaymayhem.app
# Maestro flow: iOS game-over — crash to zero sanity, confirm overlay, restart.
# iOS note: crash detection timeout extended to 35 s vs 30 s Android.
# Output screenshot: docs/media/maestro/ios/game-over.png
---
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible:
      id: "start-button"
    timeout: 20000

- tapOn:
    id: "start-button"

- extendedWaitUntil:
    visible:
      id: "hud"
    timeout: 25000

# Crash deliberately by slamming laterally
- swipe:
    start: "20%,50%"
    end: "80%,50%"
    duration: 100
- swipe:
    start: "80%,50%"
    end: "20%,50%"
    duration: 100
- swipe:
    start: "20%,50%"
    end: "80%,50%"
    duration: 100
- swipe:
    start: "80%,50%"
    end: "20%,50%"
    duration: 100
- swipe:
    start: "20%,50%"
    end: "80%,50%"
    duration: 100
- swipe:
    start: "80%,50%"
    end: "20%,50%"
    duration: 100
- swipe:
    start: "20%,50%"
    end: "80%,50%"
    duration: 100
- swipe:
    start: "80%,50%"
    end: "20%,50%"
    duration: 100

- extendedWaitUntil:
    visible:
      id: "game-over"
    timeout: 35000

- assertVisible: "CROWD LOST IT!"

- takeScreenshot: "docs/media/maestro/ios/game-over"

- tapOn:
    id: "restart-button"

- extendedWaitUntil:
    visible:
      id: "hud"
    timeout: 25000

- assertNotVisible:
    id: "game-over"

- stopApp
