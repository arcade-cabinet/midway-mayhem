name: CD – Deploy + release-please

# Fires on every push to main. Three concerns, in order:
#   1. release-please reconcile (opens/updates the release PR, cuts
#      releases when merged)
#   2. Deploy the web build to GitHub Pages
#   3. Assemble the Android debug APK and upload it as a workflow
#      artifact (available on the CD run; release artifacts are built
#      separately in release.yml on release-published)
#
# Per governance rules: Android APK build goes HERE, not in ci.yml,
# and NOT in a separate workflow. GitHub Pages deploy goes HERE, not
# in a dedicated gh-pages workflow.
#
# The android-debug-apk job below builds an unsigned debug APK on
# every push to main and uploads it as a release-candidate artifact.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: cd-deploy
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please reconcile
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # PAT with PR-create permissions — required because the org
          # policy disables write permissions for the default
          # GITHUB_TOKEN, which surfaces as "GitHub Actions is not
          # permitted to create or approve pull requests".
          token: ${{ secrets.CI_GITHUB_TOKEN }}

  deploy-web:
    name: Build & deploy web to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & Type Check
        run: pnpm exec biome ci . && pnpm exec tsc --noEmit

      - name: Run tests (node project only — browser tests need GPU + live Chrome, run separately in ci.yml)
        run: pnpm test:node

      - name: Build production bundle
        run: pnpm build

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  android-debug-apk:
    name: Assemble Android debug APK
    runs-on: ubuntu-latest
    needs: [deploy-web]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Java (Temurin 21)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web bundle for Capacitor
        run: pnpm build:native

      - name: Sync Capacitor Android project
        run: pnpm exec cap sync android

      - name: Assemble Android debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: midway-mayhem-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
