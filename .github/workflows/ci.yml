name: CI

# Triggers on every push to main AND every pull request regardless of
# target branch. Per governance rules: no branches filter on the
# pull_request event — CI gates must run on PRs into feature branches,
# release branches, or any other target equally.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      refresh_snapshots:
        description: "Update missing snapshots"
        type: boolean
        default: false

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Biome lint + format check
        run: pnpm exec biome ci .
      - name: TypeScript type check
        run: pnpm exec tsc --noEmit

  node-tests:
    name: Node Tests (Vitest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run node-surface Vitest tests
        run: pnpm test:node

  browser-smoke:
    name: Browser Smoke Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Run browser smoke tests
        run: pnpm test:browser smoke --passWithNoTests

  browser-snapshots:
    name: Browser Snapshot Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Run browser snapshot tests
        run: pnpm test:browser
        env:
          # Vite passes VITE_* env vars to the browser runtime. Integration
          # helpers use this to 5× their wall-clock budget — swiftshader
          # WebGL on the CI runner is 3-5× slower than real-GPU chrome.
          VITE_CI: '1'

  build:
    name: Production Build + Bundle Budget
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, node-tests, browser-smoke]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build production bundle
        run: pnpm build
      - name: Gzipped critical-path budget gate (PRQ E4 — <2 MB)
        # audit-perf.ts walks dist/assets/*.js, computes gzip size of each
        # chunk, classifies critical vs lazy, enforces critical < 2 048 KB
        # and total < 5 120 KB, emits perf-budget.json, and writes a
        # Markdown table to $GITHUB_STEP_SUMMARY.
        run: pnpm audit:bundle
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-budget-report
          path: perf-budget.json

  android-smoke:
    name: Android Smoke (Maestro)
    # ubuntu-latest supports KVM hardware acceleration via /dev/kvm which
    # reactivecircus/android-emulator-runner uses for x86_64 api-33 emulators.
    runs-on: ubuntu-latest
    needs: [build]
    # APK build is blocking — it's the shipped Android artifact. Only the
    # Maestro emulator run is non-blocking (scoped via continue-on-error
    # on that specific step) because KVM emulator boot is a known CI
    # flake unrelated to app health.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build native web bundle
        run: pnpm build:native

      - name: Sync Capacitor assets into android/
        run: pnpm exec cap sync android

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: midway-mayhem-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run all Maestro flows on emulator (api-33 / google_apis / x86_64)
        # KVM emulator boot on GitHub Actions runners flakes periodically
        # (ADB daemon connect failures). Scope the non-blocking to just
        # the emulator step so APK build failures still block.
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          target: google_apis
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            bash scripts/maestro-all.sh

      - name: Copy Maestro screenshots to docs/media
        if: always()
        run: |
          mkdir -p docs/media/maestro/android
          LATEST=$(ls -1dt "$HOME/.maestro/tests/"* 2>/dev/null | head -1)
          if [ -n "${LATEST}" ]; then
            find "${LATEST}" -name "*.png" -exec cp {} docs/media/maestro/android/ \;
          fi

      - name: Upload Maestro results + debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-android-results
          path: |
            ~/.maestro/tests/
            docs/media/maestro/android/
          retention-days: 14

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    # Runs the SMOKE subset only (see the test step below). The deep
    # telemetry suite (@nightly) runs via `pnpm e2e:nightly` locally or
    # on the scheduled e2e-nightly workflow.
    #
    # Smoke is a real merge gate — use DOM locators, no page.evaluate
    # against WebGL pages. See #184 for why.
    # Cap the whole job at 20 min so a stalled run can't tie up a runner.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Install xvfb for headed browser
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - run: pnpm build
      - name: Run E2E smoke tests (headed via xvfb)
        env:
          REFRESH_SNAPSHOTS: ${{ inputs.refresh_snapshots }}
        run: |
          pnpm copywasm
          # CI runs the SMOKE subset only (everything without an @nightly
          # tag) — targeted merge-gate coverage in under 10 min. The
          # deep telemetry specs (seed-playthroughs, determinism, the
          # 5-second governor runs) stay in the suite but run only via
          # `pnpm e2e:nightly` on local dev or a scheduled nightly job.
          # --update-snapshots=missing accepts new baselines for
          # brand-new tests but still compares existing ones.
          if [ "$REFRESH_SNAPSHOTS" = "true" ]; then
            xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" pnpm exec playwright test --grep-invert @nightly --update-snapshots=all
          else
            xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" pnpm exec playwright test --grep-invert @nightly --update-snapshots=missing
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

      # Preserve the per-interval playthrough dumps (PNG frames + diag
      # JSON) emitted by e2e/_factory.ts. These are the telemetry the
      # project relies on to reason about "what did seed X look like at
      # t=Ns"; the HTML report only surfaces screenshots inside the
      # trace viewer, and the JSON diagnostics aren't captured at all.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playthrough-dumps
          path: |
            test-results/**/playthrough/**/frame-*.png
            test-results/**/playthrough/**/frame-*.json
            test-results/**/playthrough/**/summary.json
          if-no-files-found: ignore
          retention-days: 14
