name: Release

# Triggers ONLY on a published GitHub Release. Builds production
# artifacts and attaches them to the release. release-please runs in
# cd.yml on push-to-main and is responsible for creating the release
# that eventually reaches this workflow.
#
# NOTE: android/ directory is not yet present in this repo.
# The Android APK block is commented out until `npx cap add android`
# is run and the android/ directory is committed.
# TODO: run `pnpm exec cap add android`, commit android/, then uncomment
#       the APK assembly block and restore it to gh release upload.

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build-release-artifacts:
    name: Build & attach release artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web production bundle
        run: pnpm build

      - name: Zip web bundle
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          cd dist && zip -r "../midway-mayhem-web-${RELEASE_TAG}.zip" . && cd ..

      - name: Setup Java (Temurin 21)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Assemble Android release APK
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          pnpm exec cap sync android
          cd android
          ./gradlew assembleRelease || ./gradlew assembleDebug
          cd ..
          if [ -f android/app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk "midway-mayhem-android-${RELEASE_TAG}.apk"
          else
            cp android/app/build/outputs/apk/debug/app-debug.apk "midway-mayhem-android-${RELEASE_TAG}.apk"
          fi

      - name: Attach artifacts to the published release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "midway-mayhem-web-${RELEASE_TAG}.zip" \
            "midway-mayhem-android-${RELEASE_TAG}.apk" \
            --clobber

      - name: Upload artifacts as workflow artefacts
        uses: actions/upload-artifact@v7
        with:
          name: midway-mayhem-release-${{ github.event.release.tag_name }}
          path: |
            midway-mayhem-web-*.zip
            midway-mayhem-android-*.apk
          if-no-files-found: warn
